# MariaDB konfiguracija
spring.datasource.url=jdbc:mariadb://localhost:3306/tinylinkdb
spring.datasource.username=root
spring.datasource.password=

# ruta
tinylink.base-url=http://localhost:8080/api/

# JPA postavke
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true


# Port aplikacije
server.port=8080

# Rate limiting
resilience4j.ratelimiter.instances.shortenUrl.limit-for-period=5
resilience4j.ratelimiter.instances.shortenUrl.limit-refresh-period=60s
resilience4j.ratelimiter.instances.shortenUrl.timeout-duration=0

# Cache
spring.cache.type=caffeine
spring.cache.caffeine.spec=maximumSize=1000,expireAfterWrite=60s
